name: Desktop Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Build Windows app
        if: matrix.label == 'windows'
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Build macOS app
        if: matrix.label == 'macos'
        shell: bash
        run: bash ./scripts/build_macos.sh

      - name: Upload Windows executable artifact
        if: matrix.label == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/QRStudioPro.exe

      - name: Upload macOS dmg artifact
        if: matrix.label == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/QRStudioPro-macos.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/macos

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/QRStudioPro.exe
            artifacts/macos/QRStudioPro-macos.dmg
          generate_release_notes: true

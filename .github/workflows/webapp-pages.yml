name: Webapp Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/qr-web/**'
      - '.github/workflows/webapp-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/qr-web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix apps/qr-web

      - name: Build webapp
        run: npm run build --prefix apps/qr-web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/qr-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
